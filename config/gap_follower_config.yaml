gap_steering_node:
  ros__parameters:
    scan_topic: "/scan"
    drive_topic: "/cmd_vel"
    filtered_scan_topic: "/filtered_scan"
    limit_angle: 100.0
    kp: 0.41
    kd: 1.55
    k_sigmoid_steering: 10.0 # increase this value to get steeper curve
    k_sigmoid_linear_vel: 0.2 # increase this value to get steeper curve 
    arc_length: 0.25 # Half car's width
    number_of_critical_edges: 8
    obstacle_distance_thresh: 0.4
    min_distance: 0.1
    max_distance: 8.0
    min_vel: 0.1
    max_vel: 0.4