gap_steering_node:
  ros__parameters:
    scan_topic: "/scan"
    drive_topic: "/cmd_vel"
    filtered_scan_topic: "/filtered_scan"
    limit_angle: 85.0
    kp: 0.41
    kd: 1.55
    k_sigmoid_steering: 10.0 # increase this value to get steeper curve
    k_sigmoid_linear_vel: 0.3 # increase this value to get steeper curve 
    arc_length: 0.225 # Half car's width
    number_of_critical_edges: 4
    obstacle_distance_thresh: 0.5
    min_distance: 0.4
    max_distance: 10.0
    min_vel: 0.05
    max_vel: 1.5